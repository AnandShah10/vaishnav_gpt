<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vaishnav GPT</title>
    <link rel="icon" href="{% static 'logo.png' %}" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }

        .suggestion-chip { 
            transition: all 0.3s ease; 
        }
        .suggestion-chip:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgb(245 158 11 / 0.2);
        }

        .message-content {
            line-height: 1.7;
        }
        
        .message-content a {
            color: #10b981;
            text-decoration: underline;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb {
            background: #d97706;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-[#f8f1e3] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-amber-900 to-amber-800 text-white shadow-lg">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-white/10 backdrop-blur rounded-2xl flex items-center justify-center border border-white/30">
                    <img src="{% static 'logo.png' %}" alt="Logo" class="w-8 h-8 object-contain">
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Vaishnav GPT</h1>
                    <p class="text-xs text-amber-100">Divine Wisdom • Bhakti</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex flex-col max-w-5xl mx-auto w-full px-4 pt-8">

        <!-- Welcome -->
        <div class="text-center mb-10">
            <div class="mx-auto w-20 h-20 bg-gradient-to-br from-orange-500 to-amber-600 text-white rounded-3xl flex items-center justify-center text-5xl shadow-xl mb-5">
                ॐ
            </div>
            <h2 class="heading-font text-4xl text-amber-900">Jai Shree Krishna</h2>
            <p class="text-amber-700 mt-2">Ask anything about Krishna, Gita, Bhakti, or Vaishnav tradition.</p>
        </div>

        <!-- Suggestions -->
        <div id="suggestions" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-10">
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                Explain Bhagavad Gita Chapter 2
            </button>
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                Who is Lord Krishna?
            </button>
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                Significance of Janmashtami
            </button>
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                Tell me about Radha Krishna
            </button>
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                What is Bhakti Yoga?
            </button>
            <button onclick="sendQuickPrompt(this)" class="suggestion-chip bg-white border border-amber-200 hover:border-amber-400 text-amber-800 px-5 py-4 rounded-3xl text-sm font-medium">
                Popular Vaishnav Bhajans
            </button>
        </div>

        <!-- Messages Area -->
        <div id="messages" class="flex-1 overflow-y-auto bg-white/80 backdrop-blur rounded-3xl p-6 space-y-6 border border-amber-100 shadow-inner mb-6">
        </div>

        <!-- Input -->
        <div class="bg-white rounded-3xl shadow-xl border border-amber-100 p-2">
            <div class="flex gap-3 items-center px-4">
                <textarea id="userInput" rows="1"
                    class="flex-1 resize-none bg-transparent focus:outline-none py-4 text-base placeholder:text-amber-400"
                    placeholder="Ask about Vaishnav philosophy, Krishna leela, rituals..."></textarea>
                
                <button id="sendBtn" 
                    class="bg-gradient-to-br from-amber-600 to-orange-600 hover:from-amber-700 hover:to-orange-700 w-12 h-12 flex items-center justify-center rounded-2xl text-white shadow transition-all active:scale-95">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const suggestionsContainer = document.getElementById('suggestions');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let hasInteracted = false;

        function log(message) {
            console.log(`[VaishnavGPT] ${message}`);
        }

        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

            if (isUser) {
                div.innerHTML = `
                    <div class="max-w-[80%] bg-amber-600 text-white rounded-3xl rounded-tr-none px-6 py-4">
                        <p>${content}</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="max-w-[80%] bg-white border border-amber-100 rounded-3xl rounded-tl-none px-6 py-4 shadow">
                        <div class="message-content text-amber-800 prose prose-amber">${content}</div>
                    </div>
                `;
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = "flex justify-start";
            typing.innerHTML = `
                <div class="bg-white border border-amber-100 rounded-3xl rounded-tl-none px-6 py-4">
                    Vaishnav GPT is thinking <span class="animate-pulse">...</span>
                </div>
            `;
            messagesContainer.appendChild(typing);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return typing;
        }

        function hideSuggestions() {
            if (suggestionsContainer) {
                suggestionsContainer.style.display = 'none';
            }
        }

        async function callAPI(message) {
            const typing = showTyping();

            // Hide suggestions after first interaction
            if (!hasInteracted) {
                hasInteracted = true;
                hideSuggestions();
            }

            try {
                const response = await fetch('/api/vaishnav-bot/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                typing.remove();

                if (data.reply) {
                    addMessage(data.reply, false);
                } else {
                    addMessage("Jai Shree Krishna! 🙏", false);
                }
            } catch (error) {
                console.error("Error:", error);
                typing.remove();
                addMessage("Sorry, I couldn't connect. Please try again.");
            }
        }

        window.sendQuickPrompt = function(btn) {
            const text = btn.textContent.trim();
            addMessage(text, true);
            callAPI(text);
        };

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';
            callAPI(msg);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Events
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        window.onload = () => {
            log("Vaishnav GPT loaded");
            addMessage("Jai Shree Krishna! 🙏 How may I serve you today?", false);
        };
    </script>
</body>
</html>
